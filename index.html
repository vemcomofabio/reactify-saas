<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Reactify">
<title>Reactify — Agente de Roteiros</title>
<style>
:root{
  --bg:#0d1410;--bg2:#111714;--bg3:#172019;--bg4:#1d2b21;
  --verde:#39ac60;--verde2:#2d9150;--verde3:#4aba6e;--verde-glow:rgba(57,172,96,0.25);
  --texto:#f0f4f1;--texto2:#a8b8ad;--borda:rgba(57,172,96,0.18);--borda2:rgba(57,172,96,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--texto);font-family:'Segoe UI',system-ui,sans-serif}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--azul:#4f8ef7;--roxo:#a78bfa;--verde:#22c55e;--laranja:#fb923c;--texto:#e2e8f0;--texto2:#94a3b8;--borda:#2a2a3a}
html,body{height:100%;background:var(--bg);color:var(--texto);font-family:'Segoe UI',system-ui,sans-serif}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--borda);border-radius:20px;padding:32px 28px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--verde),var(--verde2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--texto2);font-size:13px;margin-top:4px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--texto2);letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:12px 14px;color:var(--texto);font-size:14px;outline:none;transition:.2s}
.form-input:focus{border-color:var(--azul)}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--azul),var(--roxo));color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:.2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.form-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--texto2)}
.form-toggle a{color:var(--azul);cursor:pointer;text-decoration:none}
.form-error{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 13px;font-size:13px;color:#f87171;margin-bottom:14px;display:none}
.form-error.show{display:block}

/* APP */
.app{display:none;flex-direction:column;height:100vh}
.app.show{display:flex}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--borda);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--azul),var(--roxo));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-info{display:flex;align-items:center;gap:8px}
.user-nome{font-size:12px;color:var(--texto2)}
.logout-btn{background:none;border:1px solid var(--borda);border-radius:8px;padding:4px 10px;color:var(--texto2);font-size:11px;cursor:pointer}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px}

/* AGENTE */
.card{background:var(--bg2);border:1px solid var(--borda);border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.label{font-size:10px;font-weight:700;color:var(--texto2);letter-spacing:.8px;margin-bottom:7px;display:block;text-transform:uppercase}
.select,.textarea{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 13px;color:var(--texto);font-size:13px;outline:none;font-family:inherit}
.select:focus,.textarea:focus{border-color:var(--roxo)}
.textarea{resize:vertical;min-height:85px;line-height:1.6;padding-right:44px}
.section{margin-bottom:16px}
.tom-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:0}
.tom-btn{padding:10px 8px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid var(--borda);background:var(--bg3);color:var(--texto2);cursor:pointer;text-align:center;line-height:1.4;transition:.15s}
.tom-btn.active{background:rgba(167,139,250,.2);border-color:var(--roxo);color:var(--roxo)}
.desc-wrap{position:relative}
.mic-btn{position:absolute;right:10px;top:10px;width:30px;height:30px;border-radius:50%;border:1px solid var(--borda);background:var(--bg3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.2s}
.mic-btn.rec{background:rgba(248,113,113,.2);border-color:#f87171;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}
.perg-box{background:var(--bg3);border:1px solid var(--borda);border-radius:10px;padding:10px 13px;margin-bottom:8px}
.perg-q{font-size:11px;color:var(--texto2);margin-bottom:4px}
.perg-a{width:100%;background:none;border:none;color:var(--texto);font-size:13px;outline:none;resize:none;font-family:inherit}
.gerar-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--roxo),var(--azul));color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.gerar-btn:disabled{opacity:.5;cursor:not-allowed}
.loading{text-align:center;padding:28px;color:var(--texto2);display:none}
.spin{display:inline-block;width:22px;height:22px;border:2px solid var(--borda);border-top-color:var(--roxo);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.resultado{background:var(--bg3);border-radius:12px;padding:14px;font-size:13px;line-height:1.9;color:var(--texto);white-space:pre-wrap;border-left:3px solid var(--roxo);display:none;margin-top:14px}
.copy-btn{width:100%;padding:11px;border-radius:10px;background:var(--verde);color:#000;border:none;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;display:none;align-items:center;justify-content:center;gap:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-mensal{background:rgba(79,142,247,.2);color:var(--azul)}
.badge-admin{background:rgba(34,197,94,.2);color:var(--verde)}
.badge-trial{background:rgba(251,146,60,.2);color:var(--laranja)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--borda);border-radius:2px}

@media(min-width:600px){
  .tom-grid{grid-template-columns:repeat(3,1fr)}
  .content{max-width:640px;margin:0 auto}
}

/* ===== TEMA VEMCOMOFABIO - VERDE PROFUNDO ===== */
body { background: radial-gradient(ellipse at top, #172019 0%, #0d1410 60%); }

.login-wrap { background: radial-gradient(ellipse at 50% 0%, rgba(57,172,96,0.12) 0%, transparent 60%); }

.login-box {
  background: rgba(17,23,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(57,172,96,0.2);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(57,172,96,0.1), inset 0 1px 0 rgba(57,172,96,0.1);
}

.login-logo h1 {
  background: linear-gradient(135deg, #4aba6e, #39ac60, #2d9150);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(57,172,96,0.4));
}

.btn-primary {
  background: linear-gradient(135deg, #4aba6e, #2d9150) !important;
  box-shadow: 0 4px 20px rgba(57,172,96,0.35), 0 0 0 1px rgba(57,172,96,0.2);
  transition: all .2s;
}
.btn-primary:hover { box-shadow: 0 6px 30px rgba(57,172,96,0.5), 0 0 0 1px rgba(57,172,96,0.3); transform: translateY(-1px); }

.form-input {
  background: rgba(13,20,16,0.8) !important;
  border: 1px solid rgba(57,172,96,0.15) !important;
  transition: .2s;
}
.form-input:focus { border-color: rgba(57,172,96,0.5) !important; box-shadow: 0 0 0 3px rgba(57,172,96,0.1); }

.header {
  background: rgba(13,20,16,0.9) !important;
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(57,172,96,0.15) !important;
  box-shadow: 0 1px 20px rgba(0,0,0,0.3);
}

.logo {
  background: linear-gradient(135deg, #4aba6e, #39ac60) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  filter: drop-shadow(0 0 10px rgba(57,172,96,0.3));
}

.card, .m2box {
  background: rgba(17,23,20,0.7) !important;
  backdrop-filter: blur(16px);
  border: 1px solid rgba(57,172,96,0.15) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(57,172,96,0.08);
}

.tom-btn.active {
  background: rgba(57,172,96,0.2) !important;
  border-color: var(--verde) !important;
  color: var(--verde3) !important;
  box-shadow: 0 0 15px rgba(57,172,96,0.2);
}
.tom-btn:hover { border-color: rgba(57,172,96,0.4) !important; }

.gbtn {
  background: linear-gradient(135deg, #4aba6e, #2d9150) !important;
  box-shadow: 0 4px 20px rgba(57,172,96,0.35);
}
.gbtn:hover { box-shadow: 0 6px 30px rgba(57,172,96,0.5); }

.mta:focus, .mtextarea:focus { border-color: rgba(57,172,96,0.5) !important; box-shadow: 0 0 0 3px rgba(57,172,96,0.1) !important; }

.resultado { border-left: 3px solid var(--verde) !important; background: rgba(13,20,16,0.8) !important; }

.copy-btn, .copybtn { background: linear-gradient(135deg,#4aba6e,#2d9150) !important; color: #0d1410 !important; }

.search:focus { border-color: rgba(57,172,96,0.4) !important; box-shadow: 0 0 0 2px rgba(57,172,96,0.1); }

.filtro.active { background: var(--verde) !important; border-color: var(--verde) !important; box-shadow: 0 2px 10px rgba(57,172,96,0.3); }

.user-nome { color: var(--texto2); }
.badge-admin, .badge-mensal { background: rgba(57,172,96,0.2) !important; color: var(--verde3) !important; border: 1px solid rgba(57,172,96,0.3); }

/* Glow sutil no fundo quando logado */
.app.show { background: radial-gradient(ellipse at top left, rgba(57,172,96,0.06) 0%, transparent 50%); }

::-webkit-scrollbar-thumb { background: rgba(57,172,96,0.2) !important; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(57,172,96,0.4) !important; }

</style>
</head>
<body>

<!-- LOGIN / CADASTRO -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>⚡ Reactify</h1>
      <p>Agente de Roteiros para Criadores</p>
    </div>
    <div class="form-error" id="form-error"></div>

    <!-- FORM LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="login-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
      </div>
      <button class="btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
      <div class="form-toggle">
        Não tem conta? <a onclick="mostrarCadastro()">Criar conta grátis</a>
      </div>
    </div>

    <!-- FORM CADASTRO -->
    <div id="form-cadastro" style="display:none">
      <div class="form-group">
        <label class="form-label">Seu nome</label>
        <input class="form-input" id="cad-nome" type="text" placeholder="Como você se chama">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="cad-email" type="email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="cad-senha" type="password" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn-primary" id="btn-cad" onclick="fazerCadastro()">Criar minha conta</button>
      <div class="form-toggle">
        Já tem conta? <a onclick="mostrarLogin()">Entrar</a>
      </div>
    </div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="app" id="app">
  <div class="header">
    <div class="logo">⚡ Reactify</div>
    <div class="user-info">
      <span class="user-nome" id="user-nome"></span>
      <span class="badge badge-mensal" id="user-plano"></span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">✨ Agente de Roteiro</div>

      <div class="section">
        <label class="label">🎭 Tom do roteiro</label>
        <div class="tom-grid">
          <button class="tom-btn active" data-tom="empolgado" onclick="setTom(this)">😄 Empolgado<br><small>animado, energético</small></button>
          <button class="tom-btn" data-tom="surpresa" onclick="setTom(this)">😱 Surpresa<br><small>chocante</small></button>
          <button class="tom-btn" data-tom="indigcao" onclick="setTom(this)">😤 Indignação<br><small>revoltante</small></button>
          <button class="tom-btn" data-tom="inspirador" onclick="setTom(this)">🔥 Inspirador<br><small>motivacional</small></button>
          <button class="tom-btn" data-tom="curioso" onclick="setTom(this)">🤔 Curioso<br><small>misterioso</small></button>
          <button class="tom-btn" data-tom="humor" onclick="setTom(this)">😂 Humor<br><small>divertido</small></button>
        </div>
      </div>

      <div class="section">
        <label class="label">🎙️ Descreva o vídeo <span style="color:var(--azul);text-transform:none;font-weight:400">(fale ou escreva)</span></label>
        <div class="desc-wrap">
          <textarea class="textarea" id="desc" placeholder="O que acontece no vídeo? Qual a dica que ensina?"></textarea>
          <button class="mic-btn" id="micbtn" onclick="toggleVoz()" title="Falar">🎤</button>
        </div>
        <div id="micstatus" style="font-size:11px;color:#f87171;margin-top:5px;display:none">🔴 Gravando... clique para parar</div>
      </div>

      <div class="section">
        <label class="label">💡 Melhore o roteiro (opcional)</label>
        <div class="perg-box">
          <div class="perg-q">Qual reação o vídeo causa?</div>
          <textarea class="perg-a" id="p1" rows="1" placeholder="Ex: ficam chocados, dá vontade de tentar..."></textarea>
        </div>
        <div class="perg-box">
          <div class="perg-q">Para qual público?</div>
          <textarea class="perg-a" id="p2" rows="1" placeholder="Ex: mães, empreendedores, jovens..."></textarea>
        </div>
      </div>

      <button class="gerar-btn" id="gbtn" onclick="gerarRoteiro()">⚡ Gerar Roteiro Profissional</button>
      <div class="loading" id="loading"><span class="spin"></span>Agente de copy trabalhando...</div>
      <div class="resultado" id="resultado"></div>
      <button class="copy-btn" id="copybtn" onclick="copiar()">📋 Copiar roteiro completo</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('rx_token') || '';
let tomAtivo = 'empolgado';
let recognition = null, gravando = false;

// ─── AUTH ────────────────────────────────────────

function mostrarErro(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function mostrarCadastro() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-cadastro').style.display = 'block';
  document.getElementById('form-error').classList.remove('show');
}

function mostrarLogin() {
  document.getElementById('form-cadastro').style.display = 'none';
  document.getElementById('form-login').style.display = 'block';
  document.getElementById('form-error').classList.remove('show');
}

async function fazerLogin() {
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, senha})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || 'Erro ao entrar');
    salvarSessao(d);
  } catch(e) {
    mostrarErro(e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function fazerCadastro() {
  const btn = document.getElementById('btn-cad');
  btn.disabled = true; btn.textContent = 'Criando conta...';
  const nome  = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  try {
    const r = await fetch(API + '/api/cadastro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nome, email, senha})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || 'Erro ao criar conta');
    salvarSessao(d);
  } catch(e) {
    mostrarErro(e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Criar minha conta';
  }
}

function salvarSessao(d) {
  token = d.token;
  localStorage.setItem('rx_token', token);
  document.getElementById('user-nome').textContent = d.nome;
  document.getElementById('user-plano').textContent = d.plano;
  document.getElementById('user-plano').className = 'badge badge-' + d.plano;
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').classList.add('show');
}

function logout() {
  localStorage.removeItem('rx_token');
  token = '';
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-wrap').style.display = 'flex';
}

// ─── APP ─────────────────────────────────────────

function setTom(btn) {
  tomAtivo = btn.dataset.tom;
  document.querySelectorAll('.tom-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleVoz() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Use Chrome/Safari para reconhecimento de voz!'); return;
  }
  if (gravando) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'pt-BR'; recognition.continuous = true; recognition.interimResults = false;
  recognition.onresult = e => {
    let txt = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      if (e.results[i].isFinal) txt += e.results[i][0].transcript + ' ';
    const ta = document.getElementById('desc');
    ta.value += (ta.value ? ' ' : '') + txt;
  };
  const parar = () => {
    gravando = false;
    document.getElementById('micbtn').classList.remove('rec');
    document.getElementById('micbtn').textContent = '🎤';
    document.getElementById('micstatus').style.display = 'none';
  };
  recognition.onerror = parar; recognition.onend = parar;
  recognition.start(); gravando = true;
  document.getElementById('micbtn').classList.add('rec');
  document.getElementById('micbtn').textContent = '⏹';
  document.getElementById('micstatus').style.display = 'block';
}

async function gerarRoteiro() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { alert('Descreva o que acontece no vídeo!'); return; }

  document.getElementById('gbtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('copybtn').style.display = 'none';

  try {
    const r = await fetch(API + '/api/gerar-roteiro', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
      body: JSON.stringify({
        descricao: desc,
        tom: tomAtivo,
        reacao: document.getElementById('p1').value.trim(),
        publico: document.getElementById('p2').value.trim()
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || 'Erro ao gerar');
    document.getElementById('resultado').textContent = d.roteiro;
    document.getElementById('resultado').style.display = 'block';
    document.getElementById('copybtn').style.display = 'flex';
    document.getElementById('resultado').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('resultado').textContent = '❌ ' + e.message;
    document.getElementById('resultado').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gbtn').disabled = false;
  }
}

function copiar() {
  navigator.clipboard.writeText(document.getElementById('resultado').innerText).then(() => {
    const b = document.getElementById('copybtn');
    b.textContent = '✅ Copiado!';
    setTimeout(() => b.textContent = '📋 Copiar roteiro completo', 2000);
  });
}

// Verifica se já tem token salvo
if (token) {
  fetch(API + '/api/me', {headers:{'Authorization':'Bearer '+token}})
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => salvarSessao({...d, token}))
    .catch(() => { localStorage.removeItem('rx_token'); token = ''; });
}
</script>
